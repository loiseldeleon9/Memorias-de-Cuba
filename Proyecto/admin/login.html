<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Login Administrador</title>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<style>

body{
font-family:Arial;
background:#1c1c1c;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#2a2a2a;
padding:40px;
border-radius:10px;
text-align:center;
width:350px;
}

button{
padding:10px 20px;
border:none;
border-radius:5px;
background:#2ecc71;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Panel Memorias de Cuba</h2>

<p>Acceso solo para administradores</p>

<button onclick="netlifyIdentity.open()">Iniciar sesión</button>

</div>

<script>

netlifyIdentity.on("login", user => {
window.location.href = "/admin/panel.html";
});

</script>

</body>
